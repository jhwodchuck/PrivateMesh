name: Release — Windows

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: release-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Windows installer (.exe / .msi)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~\.cargo\registry\index\
            ~\.cargo\registry\cache\
            ~\.cargo\git\db\
            target\
          key: windows-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo bin (tauri-cli)
        uses: actions/cache@v4
        with:
          path: ~\.cargo\bin\cargo-tauri.exe
          key: windows-tauri-cli-2

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web frontend
        run: pnpm --filter @privatemesh/web build

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Build Windows app
        working-directory: apps/desktop
        run: cargo tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: privatemesh-windows
          path: |
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*.exe
          retention-days: 30
